<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letras Hacker - Efecto Matrix Scramble</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen text-white font-outfit flex flex-col items-center justify-between p-4 md:p-8">

  <!-- Header / Tutorial Title -->
  <header class="w-full max-w-4xl text-center py-6">
    <div
      class="inline-flex items-center gap-2 px-3 py-1 bg-cyan-500/10 border border-cyan-400/30 rounded-full text-cyan-300 text-xs font-orbitron uppercase tracking-widest mb-4">
      <span class="w-2 h-2 rounded-full bg-cyan-400 animate-ping"></span>
      Efecto Interactivo
    </div>
    <h1 id="main-title" class="text-4xl md:text-6xl font-black tracking-tight select-none cursor-pointer">
      Letras Hacker
    </h1>
    <p class="text-white/40 text-sm md:text-base mt-3 max-w-lg mx-auto">
      Pasa el cursor por encima del texto para decodificarlo, o escribe tu propia palabra abajo.
    </p>
  </header>

  <!-- Main Demo Section -->
  <main class="w-full max-w-2xl flex-1 flex flex-col items-center justify-center my-4">
    
    <!-- Unified Interactive Card -->
    <div class="w-full glass-card rounded-[32px] p-8 md:p-10 text-center relative overflow-hidden transition-all duration-300 glow-purple flex flex-col gap-8">
      <!-- Glow background -->
      <div class="absolute -right-20 -top-20 w-48 h-48 rounded-full bg-cyan-500/10 blur-3xl pointer-events-none"></div>
      <div class="absolute -left-20 -bottom-20 w-48 h-48 rounded-full bg-purple-500/10 blur-3xl pointer-events-none"></div>

      <!-- Scramble Display Target -->
      <div class="min-h-[120px] flex flex-col items-center justify-center">
        <h2 id="scramble-display" class="text-4xl sm:text-5xl md:text-7xl font-black tracking-tight select-none font-orbitron bg-clip-text text-transparent bg-gradient-to-r from-white via-cyan-200 to-purple-400 drop-shadow-[0_0_15px_rgba(255,255,255,0.15)] leading-tight break-all cursor-pointer">
          DECIFRAME
        </h2>
        <p class="text-white/30 text-[10px] uppercase tracking-[0.2em] mt-3 pointer-events-none">
          Pasa el cursor sobre la palabra
        </p>
      </div>

      <!-- Divider line -->
      <div class="h-px w-full bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>

      <!-- Input Control Area Inside -->
      <div class="w-full max-w-sm mx-auto flex flex-col gap-4">
        <div>
          <label for="text-input" class="block text-[10px] font-bold text-white/50 uppercase tracking-[0.25em] mb-2 text-left">
            Escribe algo para probar:
          </label>
          <input type="text" id="text-input" value="DECIFRAME" maxlength="24" placeholder="Escribe tu texto..."
            class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:border-cyan-400 focus:bg-white/10 focus:outline-none transition-all text-white font-semibold placeholder-white/20 text-center tracking-wide" />
        </div>
        <div class="flex items-center justify-between mt-1">
          <span class="text-xs text-white/40">Efecto automático al escribir</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="auto-scramble" checked class="sr-only peer">
            <div class="w-9 h-5 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-cyan-500">
            </div>
          </label>
        </div>
      </div>
    </div>

  </main>

  <!-- Footer with copy code suggestion -->
  <footer class="w-full max-w-4xl text-center py-6 border-t border-white/5 text-white/30 text-xs">
    <p>Powered by <a href="https://ntdesweb.com" target="_blank"
        class="text-cyan-400 hover:text-cyan-300 font-bold transition-all">NachoTorresRD</a> en <a
        href="https://ntdesweb.com" target="_blank"
        class="text-cyan-400 hover:text-cyan-350 transition-all font-semibold">ntdesweb.com</a></p>
  </footer>

  <!-- Custom Script -->
  <script src="script.js" defer></script>
</body>

</html>
